backend:
  name: git-gateway
  branch: main

media_folder: 'public/uploads'
public_folder: '/uploads'

collections:
  - name: 'pages'
    label: 'Pages'

    files:
      - label: 'Accueil'
        name: 'home'
        file: 'content/home.json'

        fields:
          - label: 'Titre'
            name: 'titre'
            widget: 'string'

          - label: 'Description'
            name: 'paragraph'
            widget: 'text'
